services:
  mongo:
    image: mongo:7
    container_name: praja-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: praja

  backend:
    build:
      context: ./backend
    container_name: praja-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/praja
      NODE_ENV: development
    depends_on:
      - mongo

  analyze:
    build:
      context: ./analyze_service
    container_name: praja-analyze
    restart: always
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: praja-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_ANALYZE_URL: http://localhost:8000
    depends_on:
      - backend
      - analyze

volumes:
  mongo-data:
