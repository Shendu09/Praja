services:
  mongo:
    image: mongo:7
    container_name: vyavastha-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: vyavastha

  backend:
    build:
      context: ./backend
    container_name: vyavastha-backend
    restart: always
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      MONGODB_URI: mongodb://mongo:27017/vyavastha
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
      ALLOW_START_WITHOUT_DB: "true"
    depends_on:
      - mongo

  analyze:
    build:
      context: ./analyze_service
    container_name: vyavastha-analyze
    restart: always
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 8.8.4.4

  frontend:
    build:
      context: ./frontend
    container_name: vyavastha-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5001/api
      VITE_ANALYZE_URL: http://localhost:8000
      VITE_NGROK_URL: ${VITE_NGROK_URL:-}
    depends_on:
      - backend
      - analyze

volumes:
  mongo-data:
